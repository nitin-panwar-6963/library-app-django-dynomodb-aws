{% extends 'base.html' %}
{% block content %}

<div class="glass-card p-5 w-100" style="max-width: 420px;">
    <h2 class="text-center mb-4">📚 Create Account</h2>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label>Name</label>
            {{ form.name }}
        </div>

        <div class="mb-3">
            <label>Email</label>
            {{ form.email }}
        </div>

        <div class="mb-3">
            <label>Password</label>
            {{ form.password }}
        </div>

        <button class="btn btn-primary w-100">Register</button>
    </form>

    <p class="text-center mt-3">
        Already have account? <a href="/login/" class="text-info">Login</a>
    </p>
</div>

{% endblock %}
